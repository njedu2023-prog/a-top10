version: "0.2-core-value"
timezone: "Asia/Shanghai"

data_repo:
  warehouse_root: "_warehouse"
  repo_name: "a-share-top3-data"
  raw_dir: "data/raw"

io:
  outputs_dir: "outputs"
  keep_history: true
  topn: 10
  topk_strength: 50
  candidate_size_hint: [30, 200]

filters:
  emotion_gate:
    min_limit_up_cnt: 50
    max_broken_rate: 0.35
    min_max连板高度: 3

  candidate_pool:
    must_close_limit_up: true
    exclude_st: true
    exclude_delist_risk: true
    exclude_extreme_one_word: false

scores:
  strength:
    w_seal_early: 0.35
    w_break_less: 0.25
    w_seal_amount: 0.20
    w_turnover_ok: 0.20

theme:
  sigmoid_k: 0.18
  use_dragon_leader_rank: true
  topk_industry: 40
  dragon_bonus: 0.08
  north_bonus: 0.05
  fuzzy_max_rows: 300

ml:
  model: "auto"             # auto prefers HGB; options: hgb | logistic | lightgbm
  schema_version: "step5-v4"
  feature_mode: "core_then_enhanced"
  probability_contract: "calibrated_model_else_rank_score"

  # ===== V2：Step5 概率语义配置 =====
  enable_rule: true
  enable_ml: true

  # ml_first: 有 ml 用 ml，无 ml 回退 rule
  # weighted:  rule/ml 按权重融合
  fusion_mode: "ml_first"

  fallback_to_rule: true

  clip_min: 0.0
  clip_max: 1.0

  rule_weight: 0.30
  ml_weight: 0.70

training:
  # ===== V2：运行模式与模型更新契约 =====
  # replay     : 历史回放，只重建历史产物，默认不更新正式模型
  # train      : 正式训练模式，允许按门槛训练并更新模型
  # auto_daily : 每日自动运行，是否训练 / 是否更新模型由成熟样本门槛控制
  run_mode: "auto_daily"

  # replay 模式默认不更新模型；此处保留为显式配置锚点
  allow_model_update_on_replay: false

  # ===== V2：Level 1 / 2 / 3 样本门槛 =====
  # Level 1:  80 <= mature_samples < 120
  #           允许试训，但不更新正式模型
  min_level1_samples: 80

  # Level 2: 120 <= mature_samples < 150
  #           正式训练起点，满足副门槛后允许更新正式模型
  min_train_samples: 120

  # Level 3: mature_samples >= 150
  #           较稳训练区，继续滚动训练并允许更新正式模型
  min_stable_samples: 150

  # ===== V2：副门槛 =====
  # 正类样本至少达到该数量，才允许正式训练/更新模型
  min_positive_samples: 12

  # 核心特征覆盖率至少达到该比例，才允许正式训练/更新模型
  min_feature_coverage: 0.85

  # Step7 训练窗口天数
  lookback_days: 150

intraday:
  enabled: true
  require_intraday_features: false
  require_stk_auction: false
  missing_policy: "neutral"

  neutral_values:
    quality: 0.55
    reseal: 0.50
    auction_strength: 0.50
    soft_risk: 0.00
    late_withdraw: 0.00
    open_board_count: 0
    confidence: 0.00

  quality_weights:
    limitup_quality_score: 0.30
    reseal_score: 0.20
    auction_strength_score: 0.15
    late_stability_score: 0.20
    path_smoothness_score: 0.15

  soft_risk_weights:
    late_withdraw_score: 0.30
    open_board_risk_score: 0.25
    weak_reseal_risk_score: 0.20
    auction_fake_strength_score: 0.15
    volatility_risk_score: 0.10

  strength_plus:
    base_strength_weight: 0.80
    intraday_quality_weight: 0.20

  # Diagnostic adjustment only. It must never re-order the published list.
  final_score:
    quality_bonus_weight: 0.025
    confidence_bonus_weight: 0.010
    soft_risk_penalty_weight: 0.045
    hard_risk_penalty: 0.080
    late_withdraw_penalty_weight: 0.035
    open_board_penalty_weight: 0.02

  hard_risk_rules:
    enable: true
    late_withdraw_score_gte: 0.80
    intraday_soft_risk_gte: 0.85
    open_board_count_gte: 4
    limitup_quality_lte: 0.25
    reseal_score_lte: 0.25

  defaults:
    intraday_available: 0
    auction_available: 0
    limitup_quality_score: 0.55
    intraday_risk_score: 0.00
    intraday_soft_risk_score: 0.00
    late_withdraw_score: 0.00
    reseal_score: 0.50
    open_board_count: 0
    open_board_risk_score: 0.00
    auction_strength_score: 0.50
    auction_real_volume_score: 0.50
    seal_stability_score: 0.50
    intraday_confidence_score: 0.00

  report:
    show_intraday_columns: true
    show_intraday_explanation: true
    show_data_coverage: true
    show_risk_breakdown: true
    max_risk_notes: 10

  debug:
    enabled: true
    write_intraday_debug_json: true
    write_intraday_audit_csv: true

# ===== V2：Step6 纯终排配置 =====
step6:
  ranking_axis: "Probability"
  strict_probability_order: true
  composite_score_diagnostic_only: true
  score_mode: "add"      # add | geo

  # final_score = w_prob * prob_final + w_strength * strength01 + w_theme * theme01
  w_prob: 0.70
  w_strength: 0.20
  w_theme: 0.10

  min_prob: 0.0
  min_score: null

  strength_scale: 100.0
  theme_scale: 1.30

  dedup_by_ts_code: true
  stable_hash_tiebreak: true

output:
  md:
    filename_pattern: "predict_top10_{date}.md"
    latest_symlink: "latest.md"
