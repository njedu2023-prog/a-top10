<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>A-Share TOP10</title>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <style>
    :root{
      --bg:#f5f5f7;
      --fg:#1d1d1f;
      --muted:#6e6e73;
      --line:#d2d2d7;
      --card:#ffffff;
      --soft:#fbfbfd;
      --accent:#0071e3;
      --accent-soft:#f5f9ff;
      --danger:#b91c1c;
      --shadow:0 18px 50px rgba(0,0,0,.06);
    }
    *{box-sizing:border-box;}
    body{
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
      margin:0;
      background:var(--bg);
      color:var(--fg);
    }
    .wrap{
      width:min(100%, 1600px);
      margin:0 auto;
      padding:28px clamp(14px, 2.6vw, 42px) 72px;
    }
    header{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:16px;
      margin-bottom:16px;
    }
    h1{
      font-size:24px;
      font-weight:650;
      line-height:1.25;
      margin:0;
      letter-spacing:0;
    }
    .sub{
      color:var(--muted);
      font-size:13px;
      margin-top:8px;
      line-height:1.5;
    }
    .nav{
      display:flex;
      gap:8px;
      align-items:center;
      flex-shrink:0;
    }
    button{
      width:40px;
      height:40px;
      border:1px solid var(--line);
      background:var(--card);
      color:var(--fg);
      border-radius:8px;
      cursor:pointer;
      font-size:18px;
      font-weight:650;
      line-height:1;
      box-shadow:0 1px 2px rgba(15,23,42,.04);
    }
    button:hover{
      border-color:#b9c7da;
      background:var(--accent-soft);
      color:var(--accent);
    }
    .card{
      border:1px solid rgba(0,0,0,.08);
      background:var(--card);
      border-radius:18px;
      padding:22px;
      margin-top:16px;
      box-shadow:var(--shadow);
      overflow:hidden;
    }
    .card h2{
      margin:0 0 12px;
      font-size:17px;
      line-height:1.35;
    }
    .md{
      line-height:1.65;
      overflow-x:auto;
    }
    .md h1,.md h2,.md h3{
      margin:24px 0 14px;
      line-height:1.35;
      letter-spacing:0;
    }
    .md h1{font-size:22px;}
    .md h2{font-size:18px;}
    .md h3{font-size:16px;}
    .md table{
      border-collapse:collapse;
      width:max-content;
      min-width:100%;
      margin:8px 0 20px;
      background:var(--card);
      table-layout:auto;
      border-radius:12px;
      overflow:hidden;
    }
    .md thead th{
      position:sticky;
      top:0;
      z-index:1;
      background:#f5f5f7;
      color:#1d1d1f;
      font-weight:650;
    }
    .md th,.md td{
      border:1px solid var(--line);
      padding:9px 11px;
      font-size:13px;
      white-space:nowrap;
      text-align:left;
      vertical-align:middle;
    }
    .md tbody tr:nth-child(even) td{background:var(--soft);}
    .md-section{
      border:1px solid rgba(0,0,0,.08);
      border-radius:16px;
      margin:18px 0;
      background:#fff;
      overflow:hidden;
    }
    .md-section-title{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:14px;
      min-height:52px;
      padding:0 14px 0 18px;
      cursor:pointer;
      user-select:none;
      background:#fff;
    }
    .md-section-title h2{
      margin:0;
      font-size:18px;
      font-weight:650;
      color:#1d1d1f;
    }
    .md-section-toggle{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      width:34px;
      height:34px;
      border:0;
      border-radius:50%;
      background:#f5f5f7;
      color:#1d1d1f;
      box-shadow:none;
      font-size:22px;
      font-weight:800;
      line-height:1;
      flex:0 0 auto;
    }
    .md-section-title:hover .md-section-toggle{
      background:#e8e8ed;
      color:var(--accent);
    }
    .md-section-body{
      padding:0 18px 18px;
      overflow-x:auto;
    }
    .md-section.is-collapsed .md-section-body{
      display:none;
    }
    .md blockquote{
      border-left:3px solid var(--line);
      margin:10px 0;
      padding:0 12px;
      color:var(--muted);
    }
    .hint{
      color:var(--muted);
      font-size:13px;
      line-height:1.5;
    }
    .err{
      color:var(--danger);
      font-size:13px;
      white-space:pre-wrap;
    }
    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin:14px 0 6px;
      gap:12px;
      flex-wrap:wrap;
    }
    .datebox{
      display:flex;
      align-items:center;
      gap:8px;
      color:var(--muted);
      font-size:14px;
    }
    input[type="date"]{
      border:1px solid var(--line);
      border-radius:8px;
      padding:8px 10px;
      font-size:14px;
      background:var(--card);
      color:var(--fg);
    }
    .badge{
      display:inline-block;
      border:1px solid rgba(0,113,227,.22);
      background:var(--accent-soft);
      border-radius:999px;
      padding:4px 10px;
      font-size:12px;
      color:#0066cc;
      margin-right:8px;
    }
    @media (max-width: 640px){
      .wrap{padding:18px 10px 48px;}
      header{align-items:flex-start;}
      h1{font-size:18px;}
      .card{padding:12px;}
      .topbar{align-items:flex-start;}
      .datebox{width:100%; justify-content:space-between;}
      input[type="date"]{max-width:170px;}
      .md th,.md td{padding:8px 9px; font-size:13px;}
      .md-section-title{padding-left:12px;}
      .md-section-title h2{font-size:16px;}
      .md-section-body{padding:0 12px 14px;}
    }
  </style>

  <script>
    const LOOKBACK_DAYS = 60;

    function yyyymmdd(date){
      const y = date.getFullYear();
      const m = String(date.getMonth()+1).padStart(2,'0');
      const d = String(date.getDate()).padStart(2,'0');
      return `${y}${m}${d}`;
    }

    function yyyy_mm_dd(date){
      const y = date.getFullYear();
      const m = String(date.getMonth()+1).padStart(2,'0');
      const d = String(date.getDate()).padStart(2,'0');
      return `${y}-${m}-${d}`;
    }

    function toDateInputValue(date){
      const y = date.getFullYear();
      const m = String(date.getMonth()+1).padStart(2,'0');
      const d = String(date.getDate()).padStart(2,'0');
      return `${y}-${m}-${d}`;
    }
    function fromDateInputValue(v){
      const [y,m,d] = v.split('-').map(x=>parseInt(x,10));
      return new Date(y, m-1, d);
    }

    function getQueryDate(){
      const p = new URLSearchParams(location.search);
      const d = p.get('d');
      if(d && /^\d{8}$/.test(d)){
        const y = parseInt(d.slice(0,4),10);
        const m = parseInt(d.slice(4,6),10);
        const dd = parseInt(d.slice(6,8),10);
        return new Date(y, m-1, dd);
      }
      return new Date();
    }

    function setQueryDate(date){
      const d = yyyymmdd(date);
      const url = new URL(location.href);
      url.searchParams.set('d', d);
      location.href = url.toString();
    }

    function cacheBust(url){
      const u = new URL(url, location.href);
      u.searchParams.set("v", String(Date.now()));
      return u.toString();
    }

    function mdPathFor(date){
      return `outputs/predict_top10_${yyyymmdd(date)}.md`;
    }

    async function fetchText(path){
      const res = await fetch(cacheBust(path), { cache: "no-store" });
      if(!res.ok) throw new Error(`${res.status} -> ${path}`);
      return await res.text();
    }

    async function findNearestExistingReportDate(startDate){
      for(let i=0; i<=LOOKBACK_DAYS; i++){
        const d = new Date(startDate);
        d.setDate(d.getDate() - i);
        const path = mdPathFor(d);
        const res = await fetch(cacheBust(path), { method: "GET", cache: "no-store" });
        if(res.ok) return d;
      }
      return null;
    }

    function parseKeyValueText(text){
      const out = {};
      (text || "").split(/\r?\n/).forEach(line=>{
        const s = line.trim();
        if(!s) return;
        const idx = s.indexOf("=");
        if(idx <= 0) return;
        const k = s.slice(0, idx).trim();
        const v = s.slice(idx+1).trim();
        out[k] = v;
      });
      return out;
    }

    async function loadRunStamp(){
      const box = document.getElementById("run_stamp");
      if(!box) return;

      const path = "outputs/learning/_last_run.txt";
      try{
        const txt = await fetchText(path);
        const kv = parseKeyValueText(txt);

        const td = kv.trade_date || "";
        const rid = kv.run_id || "";
        const sha = kv.commit_sha || "";
        const utc = kv.utc || kv.generated_at_utc || "";

        const parts = [];
        if(td) parts.push(`trade_date=${td}`);
        if(rid) parts.push(`run_id=${rid}`);
        if(sha) parts.push(`sha=${sha.slice(0,8)}`);
        if(utc) parts.push(`utc=${utc}`);

        box.textContent = parts.length ? parts.join("  ·  ") : "未读取到 run stamp";
      }catch(e){
        box.textContent = "未能读取 run stamp（_last_run.txt）";
      }
    }

    async function loadDailyReport(targetDate){
      const titleEl = document.getElementById('title');
      const reportEl = document.getElementById('report');
      const errEl = document.getElementById('report_err');
      const picker = document.getElementById('date_picker');
      const navHint = document.getElementById('nav_hint');

      errEl.textContent = "";
      reportEl.innerHTML = `<div class="hint">正在定位可用日报（最多回退 ${LOOKBACK_DAYS} 天）...</div>`;

      const useDate = await findNearestExistingReportDate(targetDate);
      if(!useDate){
        titleEl.textContent = `A-Share TOP10`;
        reportEl.innerHTML = "";
        errEl.textContent =
          `在 ${yyyymmdd(targetDate)} 往前 ${LOOKBACK_DAYS} 天内，都没有找到 outputs/predict_top10_YYYYMMDD.md。\n` +
          `请确认日报文件已提交到仓库 outputs/ 目录，并能通过 Pages 访问。`;
        return;
      }

      picker.value = toDateInputValue(useDate);
      const targetStr = yyyymmdd(targetDate);
      const useStr = yyyymmdd(useDate);
      navHint.textContent = (useStr !== targetStr)
        ? `提示：你选择的 ${targetStr} 无日报，已自动回退到最近可用日报 ${useStr}（历史冻结版）`
        : `提示：URL 参数 d=YYYYMMDD 可直接跳转某日报告（历史冻结版）`;

      const niceDate = yyyy_mm_dd(useDate);
      titleEl.textContent = `A-Share TOP10 - ${niceDate}`;
      document.title = `A-Share TOP10 - ${niceDate}`;

      const path = mdPathFor(useDate);
      reportEl.innerHTML = `<div class="hint">正在加载：${path}</div>`;

      try{
        const md = await fetchText(path);
        let md2 = md;
        const lines = md2.split(/\r?\n/);
        if (lines.length > 0 && lines[0].trim().startsWith('#')) {
          lines.shift();
          while (lines.length > 0 && lines[0].trim() === '') lines.shift();
          md2 = lines.join('\n');
        }

        reportEl.innerHTML = marked.parse(md2);
        alignCandidateTableToTop10(reportEl);
        setupCollapsibleReportSections(reportEl);
      }catch(e){
        reportEl.innerHTML = "";
        errEl.textContent = `读取日报失败：${e.message}`;
      }
    }

    function setupCollapsibleReportSections(root){
      const targets = ["分时增强数据覆盖率", "候选池补充表"];
      const headings = Array.from(root.querySelectorAll("h2")).filter(h2 => {
        const text = (h2.textContent || "").trim();
        return targets.some(target => text.includes(target));
      });

      headings.forEach(h2 => {
        const section = document.createElement("section");
        section.className = "md-section is-collapsed";

        const title = document.createElement("div");
        title.className = "md-section-title";
        title.setAttribute("role", "button");
        title.setAttribute("tabindex", "0");
        title.setAttribute("aria-expanded", "false");

        const toggle = document.createElement("button");
        toggle.className = "md-section-toggle";
        toggle.type = "button";
        toggle.textContent = "+";
        toggle.setAttribute("aria-label", "展开");

        const body = document.createElement("div");
        body.className = "md-section-body";

        h2.parentNode.insertBefore(section, h2);
        section.appendChild(title);
        title.appendChild(h2);
        title.appendChild(toggle);
        section.appendChild(body);

        let node = section.nextSibling;
        while(node){
          const next = node.nextSibling;
          if(node.nodeType === 1 && node.tagName === "H2") break;
          body.appendChild(node);
          node = next;
        }

        const setOpen = open => {
          section.classList.toggle("is-collapsed", !open);
          title.setAttribute("aria-expanded", open ? "true" : "false");
          toggle.textContent = open ? "-" : "+";
          toggle.setAttribute("aria-label", open ? "折叠" : "展开");
        };
        const toggleOpen = () => setOpen(section.classList.contains("is-collapsed"));

        title.addEventListener("click", toggleOpen);
        title.addEventListener("keydown", event => {
          if(event.key === "Enter" || event.key === " "){
            event.preventDefault();
            toggleOpen();
          }
        });
      });
    }

    function alignCandidateTableToTop10(root){
      const sections = Array.from(root.querySelectorAll("h2")).map(h2 => {
        let table = null;
        let node = h2.nextElementSibling;
        while(node && node.tagName !== "H2"){
          if(node.tagName === "TABLE"){
            table = node;
            break;
          }
          node = node.nextElementSibling;
        }
        return { h2, title: (h2.textContent || "").trim(), table };
      });

      const top = sections.find(item => item.title.includes("涨停 Top10") && item.table);
      const candidate = sections.find(item => item.title.includes("候选池补充表") && item.table);
      if(!top || !candidate) return;

      const topHeaders = Array.from(top.table.querySelectorAll("thead th")).map(th => th.textContent.trim());
      const candidateHeaders = Array.from(candidate.table.querySelectorAll("thead th")).map(th => th.textContent.trim());
      if(!topHeaders.length || topHeaders.every((h, i) => candidateHeaders[i] === h)) return;

      const oldIndex = new Map(candidateHeaders.map((h, i) => [h, i]));
      const rows = Array.from(candidate.table.querySelectorAll("tbody tr"));
      const theadRow = candidate.table.querySelector("thead tr");
      if(!theadRow) return;

      theadRow.innerHTML = topHeaders.map(h => `<th>${escapeHtml(h)}</th>`).join("");
      rows.forEach(row => {
        const cells = Array.from(row.children);
        row.innerHTML = topHeaders.map(h => {
          const idx = oldIndex.get(h);
          const value = idx !== undefined && cells[idx] ? cells[idx].innerHTML : "";
          return `<td>${value}</td>`;
        }).join("");
      });
    }

    function escapeHtml(value){
      return String(value).replace(/[&<>"']/g, ch => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        "\"": "&quot;",
        "'": "&#39;"
      }[ch]));
    }

    async function loadLearningStatus(){
      const mdPath = `outputs/learning/step7_report_latest.md`;
      const box = document.getElementById('learning');
      const err = document.getElementById('learning_err');

      err.textContent = "";
      box.innerHTML = `<div class="hint">正在加载：${mdPath}</div>`;

      try{
        const md = await fetchText(mdPath);
        box.innerHTML = marked.parse(md);
      }catch(e){
        box.innerHTML = "";
        err.textContent = `未能读取学习状态：${e.message}\n请确认 ${mdPath} 在仓库存在且 Pages 可访问。`;
      }
    }

    async function jumpByDaysSkippingMissing(currentDate, delta){
      for(let i=1; i<=LOOKBACK_DAYS; i++){
        const d = new Date(currentDate);
        d.setDate(d.getDate() + delta * i);
        const path = mdPathFor(d);
        const res = await fetch(cacheBust(path), { method: "GET", cache: "no-store" });
        if(res.ok) return d;
      }
      return null;
    }

    function bindNav(initialDate){
      const picker = document.getElementById('date_picker');

      document.getElementById('btn_prev').onclick = async () => {
        const base = fromDateInputValue(picker.value);
        const next = await jumpByDaysSkippingMissing(base, -1);
        if(next) setQueryDate(next);
        else alert(`向前 ${LOOKBACK_DAYS} 天内没有找到更早的日报文件`);
      };

      document.getElementById('btn_next').onclick = async () => {
        const base = fromDateInputValue(picker.value);
        const next = await jumpByDaysSkippingMissing(base, +1);
        if(next) setQueryDate(next);
        else alert(`向后 ${LOOKBACK_DAYS} 天内没有找到更新的日报文件`);
      };

      picker.value = toDateInputValue(initialDate);
      picker.onchange = () => {
        const d = fromDateInputValue(picker.value);
        setQueryDate(d);
      };
    }

    window.onload = async () => {
      const date = getQueryDate();
      bindNav(date);

      await loadRunStamp();
      await loadDailyReport(date);
      await loadLearningStatus();
    };
  </script>
</head>

<body>
  <div class="wrap">
    <header>
      <div>
        <h1 id="title">A-Share TOP10</h1>
        <div class="sub">
          <span class="badge">历史冻结</span>
          <span id="run_stamp">正在读取运行信息...</span>
        </div>
      </div>
      <div class="nav">
        <button id="btn_prev" title="上一份日报">←</button>
        <button id="btn_next" title="下一份日报">→</button>
      </div>
    </header>

    <div class="topbar">
      <div class="datebox">
        <span>选择日期：</span>
        <input id="date_picker" type="date" />
      </div>
      <div id="nav_hint" class="hint">提示：URL 参数 d=YYYYMMDD 可直接跳转某日报告（历史冻结版）</div>
    </div>

    <div class="card">
      <div id="report_err" class="err"></div>
      <div id="report" class="md"></div>
    </div>

    <div class="card">
      <h2>学习状态</h2>
      <div id="learning_err" class="err"></div>
      <div id="learning" class="md"></div>
    </div>
  </div>
</body>
</html>
